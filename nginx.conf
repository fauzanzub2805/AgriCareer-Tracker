worker_processes  auto;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # Optimasi GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Security Headers Dasar
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Peta kondisional: jika ada header Upgrade, set Connection ke "upgrade"
    # Jika tidak ada (request HTTP biasa), set ke "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_x_forwarded_proto $the_scheme {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_cf_connecting_ip $the_real_ip {
        default $http_cf_connecting_ip;
        ''      $remote_addr;
    }

    server {
        listen       5173;
        server_name  agricareer.site www.agricareer.site localhost;

        root   C:/Workspace/tools/nginx/html/dist;
        index  index.html index.htm;

        # 1. Caching untuk file statis
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|eot|ttf|otf)$ {
            expires 1M;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # 2. Rute utama untuk SPA (React/Vite)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Meneruskan request file S3 lokal ke backend
        location ^~ /uploads/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $the_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $the_scheme;
        }

        # Satu blok untuk semua request API (HTTP biasa + WebSocket)
        location ^~ /api/ {
            proxy_pass http://127.0.0.1:8000/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $the_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $the_scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
