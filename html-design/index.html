<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCareer-Tracker | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1424; /* Warna dasar gelap */
        }
    </style>
</head>
<body class="min-h-screen text-white antialiased">

    <div class="flex min-h-screen">
        
        <div class="relative hidden lg:flex lg:w-3/5 bg-gray-900 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop" 
                alt="Graduation" 
                class="absolute inset-0 w-full h-full object-cover opacity-80" />
            
            <div class="absolute inset-0 bg-gradient-to-r from-blue-900/40 via-[#0d1424]/80 to-[#0d1424]"></div>

            <div class="absolute bottom-12 left-12 flex items-center gap-5 z-10">
                <div class="w-20 h-20 bg-blue-900 rounded-full border-2 border-white flex items-center justify-center overflow-hidden shrink-0 shadow-lg">
                    <img src="https://upload.wikimedia.org/wikipedia/id/thumb/0/05/Makara_of_IPB_University.svg/1200px-Makara_of_IPB_University.svg.png" 
                        alt="Logo IPB" class="w-[80%] h-[80%] object-contain">
                </div>
                
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">
                        <span class="text-yellow-400">AgriCareer</span><span class="text-white">-Tracker</span>
                    </h1>
                    <p class="text-gray-200 mt-1 text-lg font-medium tracking-wide">
                        Smart Navigation to Your Dream Career.
                    </p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/5 flex flex-col justify-center items-center p-6 sm:p-12 bg-[#0d1424]">
            
            <div class="mb-8 text-center">
                <h2 class="text-3xl md:text-4xl font-bold tracking-tight">
                    <span class="text-yellow-400">Selamat</span><span class="text-white">Datang!</span>
                </h2>
            </div>

            <div class="bg-[#151c2f] w-full max-w-md rounded-2xl shadow-2xl p-8 border border-gray-800">
                
                <div class="w-14 h-14 bg-blue-600 rounded-full mx-auto flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>

                <div class="text-center mb-8">
                    <h3 class="text-xl font-semibold text-white mb-1">Login to Your Account</h3>
                    <p class="text-sm text-gray-400">use the ipb.ac.id for login</p>
                </div>

                <form action="#" method="POST">
                    
                    <div class="mb-5">
                        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" 
                            class="w-full bg-[#0d1424] border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200">
                    </div>

                    <div class="mb-5">
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" 
                            class="w-full bg-[#0d1424] border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition duration-200">
                    </div>

                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center">
                            <input id="remember_me" name="remember_me" type="checkbox" 
                                class="h-4 w-4 bg-[#0d1424] border-gray-700 rounded text-blue-600 focus:ring-blue-500 focus:ring-offset-gray-900 cursor-pointer">
                            <label for="remember_me" class="ml-2 block text-sm text-gray-400 cursor-pointer">
                                Remember me
                            </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-blue-500 hover:text-blue-400 transition">Forgot Password?</a>
                        </div>
                    </div>

                    <div>
                        <button type="submit" 
                                class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#151c2f] focus:ring-blue-500 transition duration-200">
                            Login
                        </button>
                    </div>
                </form>

                <p class="mt-8 text-center text-sm text-gray-400">
                    Don't have an account? 
                    <a href="#" class="font-medium text-blue-500 hover:text-blue-400 transition">Sign Up</a>
                </p>

            </div>
        </div>
    </div>

</body>
</html>
