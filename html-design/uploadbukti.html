<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCareer-Tracker | Upload Data Pelamar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e2638; /* Background utama */
        }
    </style>
</head>
<body class="text-white antialiased min-h-screen flex flex-col">

    <nav class="bg-[#0f1626] border-b border-gray-800 px-6 py-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-900 rounded-full border border-gray-600 flex items-center justify-center overflow-hidden">
                    <img src="https://upload.wikimedia.org/wikipedia/id/thumb/0/05/Makara_of_IPB_University.svg/1200px-Makara_of_IPB_University.svg.png" 
                        alt="Logo IPB" class="w-[70%] h-[70%] object-contain">
                </div>
                <h1 class="text-xl font-bold tracking-tight hidden sm:block">
                    <span class="text-yellow-400">AgriCareer</span><span class="text-white">-Tracker</span>
                </h1>
            </div>

            <ul class="hidden md:flex gap-8 font-medium text-sm">
                <li><a href="#" class="text-gray-300 hover:text-white transition">Beranda</a></li>
                <li><a href="#" class="text-yellow-400">Lowongan Magang</a></li>
                <li><a href="#" class="text-gray-300 hover:text-white transition">Status Lamaran</a></li>
            </ul>

            <div class="flex items-center gap-5">
                <button class="text-gray-400 hover:text-white transition relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
                <div class="w-9 h-9 rounded-full bg-gray-600 overflow-hidden border border-gray-500 cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?q=80&w=2070&auto=format&fit=crop" alt="Profile" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 sm:p-6 lg:p-8">
        
        <h2 class="text-xl sm:text-2xl font-bold text-yellow-400 mb-6">Upload data pelamar</h2>

        <div class="bg-[#0f1626] rounded-xl p-6 sm:p-10 border border-gray-800 shadow-xl max-w-5xl">
            
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 rounded-full border border-gray-500 flex items-center justify-center bg-transparent">
                </div>
                <div>
                    <h3 class="text-white font-semibold text-lg">BCA Digital</h3>
                    <p class="text-sm text-gray-400">Menara BCA, Jakarta Pusat</p>
                </div>
            </div>

            <div class="space-y-2 mb-8">
                <p class="text-sm text-gray-400">Opened: ........</p>
                <p class="text-sm text-gray-400">Due: .............</p>
            </div>

            <div class="mb-8">
                <h4 class="text-white font-medium mb-2">Deskripsi</h4>
                </div>

            <div class="mb-6">
                <h4 class="text-white font-medium mb-4">Tambah Lampiran</h4>
                
                <div class="border border-dashed border-gray-600 rounded-lg p-12 flex flex-col items-center justify-center bg-[#0f1626] hover:bg-gray-800/50 transition cursor-pointer">
                    <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center mb-4 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <p class="text-sm text-gray-400 text-center">You can drag and drop files here to add them.</p>
                </div>
            </div>

            <div class="flex justify-end mt-8">
                <button type="button" class="px-8 py-2 border border-gray-400 rounded-full text-sm font-medium text-white hover:bg-white hover:text-black transition duration-300">
                    Kirim
                </button>
            </div>

        </div>

    </main>

</body>
</html>
